name: Android Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup NodeJS >=22
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Setup Java 17 (Temurin)
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      # 4. Verify Java version
      - name: Verify Java
        run: java -version

      # 5. Install npm packages
      - name: Install dependencies
        run: npm ci

      # 6. Build Web App
      - name: Build Web App
        run: npm run build

      # 7. Capacitor Sync
      - name: Capacitor Sync
        run: npx cap sync android

      # 8. Make Gradle Wrapper Executable
      - name: Make Gradle Wrapper Executable
        run: chmod +x android/gradlew

      # 9. Clean Android Build
      - name: Clean Android
        run: |
          cd android
          ./gradlew clean -Dorg.gradle.java.home=$JAVA_HOME

      # 10. Build Release APK
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon -Dorg.gradle.java.home=$JAVA_HOME

      # 11. Upload Release APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
