name: Android Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js >=22
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3. Setup Java 17 (Temurin)
      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      - name: Verify Java
        run: java -version

      # 4. Install npm dependencies
      - name: Install dependencies
        run: npm ci

      # 5. Build web assets
      - name: Build Web App
        run: npm run build

      # 6. Capacitor sync for Android
      - name: Capacitor Sync
        run: npx cap sync android

      # 7. Make Gradle Wrapper executable
      - name: Make Gradle Wrapper Executable
        run: chmod +x android/gradlew

      # 8. Remove old Gradle caches
      - name: Remove Gradle cache
        run: rm -rf $GITHUB_WORKSPACE/.gradle

      # 9. Force Gradle to use Java 17
      - name: Force Gradle Java Version
        run: echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties

      # 10. Clean Android build (isolated cache)
      - name: Clean Android Build
        run: |
          cd android
          ./gradlew clean \
            --no-daemon \
            --max-workers=1 \
            -Dorg.gradle.java.home=$JAVA_HOME \
            -g $GITHUB_WORKSPACE/.gradle

      # 11. Build release APK (isolated cache)
      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            --no-daemon \
            --max-workers=1 \
            -Dorg.gradle.java.home=$JAVA_HOME \
            -g $GITHUB_WORKSPACE/.gradle

      # 12. Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
