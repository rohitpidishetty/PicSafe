name: Android Build

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: 17
          distribution: temurin

      - name: Verify Java
        run: java -version

      - name: Install npm packages
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Make Gradle Wrapper Executable
        run: chmod +x android/gradlew

      - name: Force Gradle to use JDK 17
        run: echo "org.gradle.java.home=$JAVA_HOME" >> android/gradle.properties

      - name: Clean Android Build
        run: |
          cd android
          ./gradlew clean --no-daemon -Dorg.gradle.java.home=$JAVA_HOME

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon -Dorg.gradle.java.home=$JAVA_HOME

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
